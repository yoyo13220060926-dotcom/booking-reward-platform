<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 背景 -->
  <circle cx="256" cy="256" r="256" fill="#f0ebe0"/>

  <!-- 護照本體 -->
  <rect x="130" y="100" width="252" height="320" rx="18" fill="#1a1a1a"/>
  <rect x="130" y="100" width="252" height="320" rx="18" fill="none" stroke="#333" stroke-width="3"/>

  <!-- 護照脊背 -->
  <rect x="130" y="100" width="28" height="320" rx="10" fill="#000"/>

  <!-- 金色圓形徽章 → 白色 -->
  <circle cx="256" cy="225" r="52" fill="#fff"/>
  <circle cx="256" cy="225" r="44" fill="none" stroke="#ccc" stroke-width="2.5"/>
  <circle cx="256" cy="225" r="36" fill="#fff"/>

  <!-- 徽章內星星 -->
  <polygon points="256,200 262,218 280,218 266,229 272,247 256,236 240,247 246,229 232,218 250,218" fill="#1a1a1a"/>

  <!-- PASSPORT 文字 -->
  <text x="256" y="292" text-anchor="middle" font-family="Georgia, serif" font-weight="700" font-size="22" fill="#fff" letter-spacing="3">PASSPORT</text>

  <!-- 底部線條 -->
  <rect x="158" y="318" width="196" height="3" rx="2" fill="#333"/>
  <rect x="158" y="330" width="196" height="3" rx="2" fill="#333"/>
