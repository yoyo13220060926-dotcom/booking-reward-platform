<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>好棒棒東東</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="好棒棒東東">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="theme-color" content="#f0ebe0">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--bg:#f0ebe0;--dark:#111;--mid:#555;--soft:#aaa;--line:rgba(0,0,0,0.1);}
html,body{background:var(--bg);}
body{min-height:100vh;font-family:-apple-system,"SF Pro Text","PingFang TC",sans-serif;display:flex;justify-content:center;overflow-x:hidden;}
.wrap{width:100%;max-width:430px;}

/* NAV */
nav{display:flex;align-items:center;justify-content:space-between;padding:52px 24px 0;}
.nav-logo{font-size:13px;font-weight:800;letter-spacing:0.18em;text-transform:uppercase;color:var(--dark);}
.nav-menu{display:flex;flex-direction:column;gap:5px;cursor:pointer;padding:4px;}
.nav-menu span{display:block;width:20px;height:1.5px;background:var(--dark);transition:0.2s;}

/* DRAWER */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0);pointer-events:none;z-index:99;transition:background 0.35s;}
.overlay.open{background:rgba(0,0,0,0.15);pointer-events:all;}
.drawer{position:fixed;top:0;right:-100%;width:100%;max-width:320px;height:100%;background:var(--bg);z-index:100;transition:right 0.38s cubic-bezier(.77,0,.18,1);display:flex;flex-direction:column;border-left:1px solid var(--line);}
.drawer.open{right:0;}
.drawer-nav{display:flex;align-items:center;justify-content:space-between;padding:52px 24px 32px;}
.drawer-logo{font-size:12px;font-weight:800;letter-spacing:0.18em;text-transform:uppercase;color:var(--dark);}
.close-btn{font-size:18px;color:var(--dark);cursor:pointer;padding:4px;line-height:1;}
.drawer-items{flex:1;padding:0 24px;}
.di{display:flex;align-items:center;justify-content:space-between;padding:20px 0;border-bottom:1px solid var(--line);text-decoration:none;cursor:pointer;}
.di:last-child{border-bottom:none;}
.di-left{display:flex;align-items:center;gap:14px;}
.di-ico{font-size:16px;opacity:0.7;}
.di-name{font-size:13px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--dark);}
.di.active .di-name{color:var(--dark);}
.di.locked .di-name{color:var(--soft);}
.di-arr{font-size:12px;color:var(--soft);}
.di-tag{font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--soft);border:1px solid var(--line);padding:2px 8px;border-radius:3px;}
.drawer-foot{padding:24px;border-top:1px solid var(--line);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--soft);}

/* HERO */
.hero{padding:52px 24px 32px;}
.hero-label{font-size:10px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--soft);margin-bottom:20px;}
.hero h1{font-size:52px;font-weight:900;line-height:0.95;letter-spacing:-2px;text-transform:uppercase;color:var(--dark);margin-bottom:24px;}
.hero-sub{font-size:13px;color:var(--mid);line-height:1.75;letter-spacing:0.02em;border-left:2px solid var(--dark);padding-left:14px;}

/* DIVIDER */
.divider{height:1px;background:var(--line);margin:0 24px;}

/* SECTION */
.section-head{display:flex;align-items:center;justify-content:space-between;padding:28px 24px 16px;}
.section-title{font-size:10px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--soft);}

/* SERVICE LIST */
.svc-list{padding:0 24px;}
.svc-item{display:flex;align-items:center;justify-content:space-between;padding:20px 0;border-bottom:1px solid var(--line);text-decoration:none;cursor:pointer;transition:opacity 0.15s;}
.svc-item:active{opacity:0.6;}
.svc-item.locked{cursor:default;}
.svc-item.locked:active{opacity:1;}
.svc-left{display:flex;align-items:center;gap:16px;}
.svc-ico{font-size:22px;width:36px;text-align:center;}
.svc-info{}
.svc-name{font-size:14px;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;color:var(--dark);margin-bottom:3px;}
.svc-item.locked .svc-name{color:var(--soft);}
.svc-desc{font-size:11px;color:var(--soft);letter-spacing:0.02em;}
.svc-right{display:flex;align-items:center;gap:10px;}
.svc-tag{font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--soft);border:1px solid var(--line);padding:3px 8px;border-radius:3px;}
.svc-arr{font-size:14px;color:var(--soft);}
.svc-item.open .svc-arr{color:var(--dark);}

/* COMING SOON */
.cs-wrap{padding:24px;}
.cs-box{border:1px solid var(--line);padding:28px 24px;text-align:center;}
.cs-label{font-size:10px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--soft);margin-bottom:10px;}
.cs-text{font-size:16px;font-weight:800;letter-spacing:0.04em;text-transform:uppercase;color:var(--dark);line-height:1.5;}
.cs-text em{font-style:normal;display:block;font-size:11px;font-weight:600;color:var(--soft);letter-spacing:0.1em;margin-top:6px;}

/* FOOTER */
footer{padding:32px 24px;border-top:1px solid var(--line);font-size:10px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--soft);}
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-nav">
    <span class="drawer-logo">LIZ'S PASS</span>
    <span class="close-btn" onclick="closeMenu()">✕</span>
  </div>
  <div class="drawer-items">
    <a class="di active" href="index.html">
      <div class="di-left"><span class="di-ico">🏠</span><span class="di-name">首頁</span></div>
      <span class="di-arr">→</span>
    </a>
    <a class="di" href="pass.html">
      <div class="di-left"><span class="di-ico">💳</span><span class="di-name">集點卡系統</span></div>
      <span class="di-arr">→</span>
    </a>
    <div class="di locked">
      <div class="di-left"><span class="di-ico">🗺️</span><span class="di-name">旅遊小筆記</span></div>
      <span class="di-tag">即將開放</span>
    </div>
    <div class="di locked">
      <div class="di-left"><span class="di-ico">⚙️</span><span class="di-name">設定</span></div>
      <span class="di-tag">即將開放</span>
    </div>
    <div class="di locked">
      <div class="di-left"><span class="di-ico">✨</span><span class="di-name">更多</span></div>
      <span class="di-tag">即將開放</span>
    </div>
  </div>
  <div class="drawer-foot">Made by Ryan</div>
</div>

<div class="wrap">
  <nav>
    <span class="nav-logo">LIZ'S PASS</span>
    <div class="nav-menu" onclick="openMenu()"><span></span><span></span><span></span></div>
  </nav>

  <div class="hero">
    <div class="hero-label">你的專屬空間</div>
    <h1>LIZ'S<br>PASS</h1>
    <p class="hero-sub">選擇你想要的服務</p>
  </div>

  <div class="divider"></div>

  <div class="section-head">
    <span class="section-title">所有服務</span>
  </div>

  <div class="svc-list">
    <a class="svc-item open" href="pass.html">
      <div class="svc-left">
        <span class="svc-ico">💳</span>
        <div class="svc-info">
          <div class="svc-name">集點卡系統</div>
          <div class="svc-desc">美甲 · 美髮 · 按摩 · 出遊</div>
        </div>
      </div>
      <span class="svc-arr">→</span>
    </a>
    <div class="svc-item locked" onclick="showComing()">
      <div class="svc-left">
        <span class="svc-ico">🗺️</span>
        <div class="svc-info">
          <div class="svc-name">旅遊小筆記</div>
          <div class="svc-desc">行程規劃 · 旅遊路線</div>
        </div>
      </div>
      <span class="svc-tag">即將開放</span>
    </div>
    <div class="svc-item locked" onclick="showComing()">
      <div class="svc-left">
        <span class="svc-ico">⚙️</span>
        <div class="svc-info">
          <div class="svc-name">設定</div>
          <div class="svc-desc">個人設定 · 通知管理</div>
        </div>
      </div>
      <span class="svc-tag">即將開放</span>
    </div>
    <div class="svc-item locked" onclick="showComing()">
      <div class="svc-left">
        <span class="svc-ico">✨</span>
        <div class="svc-info">
          <div class="svc-name">更多</div>
          <div class="svc-desc">Ryan 的下一個傑作</div>
        </div>
      </div>
      <span class="svc-tag">即將開放</span>
    </div>
  </div>

  <div class="cs-wrap" id="csWrap" style="display:none;">
    <div class="cs-box">
      <div class="cs-label">Coming Soon</div>
      <div class="cs-text">尚未開放<em>敬請期待 Ryan 的傑作</em></div>
    </div>
  </div>

  <footer>Made by Ryan © 2025</footer>
</div>

<script>
function openMenu(){document.getElementById('drawer').classList.add('open');document.getElementById('overlay').classList.add('open');document.body.style.overflow='hidden';}
function closeMenu(){document.getElementById('drawer').classList.remove('open');document.getElementById('overlay').classList.remove('open');document.body.style.overflow='';}
let cv=false;
function showComing(){cv=!cv;document.getElementById('csWrap').style.display=cv?'block':'none';if(cv)document.getElementById('csWrap').scrollIntoView({behavior:'smooth',block:'center'});}
</script>
</body>
</html>
