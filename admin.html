<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nail Pass — Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--cream:#f0ebe0;--pink:#f03e6e;--dark:#1a1a1a;--mid:#555;--soft:#999;--card:#fff;--r:18px;--green:#1db06a;--green-bg:#e6f9f1;}
html{background:var(--cream);}
body{min-height:100vh;font-family:-apple-system,"SF Pro Display","PingFang TC",sans-serif;background:var(--cream);padding:28px 18px 80px;}
.wrap{max-width:580px;margin:0 auto;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;}
.logo{font-size:15px;font-weight:900;background:var(--dark);color:#fff;padding:6px 14px;border-radius:99px;}
.badge{font-size:11px;font-weight:900;text-transform:uppercase;background:var(--pink);color:#fff;padding:6px 14px;border-radius:99px;box-shadow:2px 2px 0 var(--dark);}
.page-title{font-size:36px;font-weight:900;text-transform:uppercase;letter-spacing:-0.5px;color:var(--dark);line-height:1.05;margin-bottom:6px;}
.page-title em{font-style:normal;color:var(--pink);}
.page-sub{font-size:13px;color:var(--soft);margin-bottom:24px;}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
.stat{background:var(--card);border:2px solid var(--dark);border-radius:var(--r);box-shadow:3px 3px 0 var(--dark);padding:16px 14px;text-align:center;}
.stat-n{font-size:30px;font-weight:900;color:var(--dark);}
.stat-n.pink{color:var(--pink);}
.stat-l{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--soft);margin-top:4px;}
.stamp-card{background:var(--card);border:2px solid var(--dark);border-radius:var(--r);box-shadow:4px 4px 0 var(--dark);padding:20px;margin-bottom:16px;}
.sc-row{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:16px;}
.sc-info .ttl{font-size:15px;font-weight:900;text-transform:uppercase;color:var(--dark);}
.sc-info .sub{font-size:12px;color:var(--soft);margin-top:3px;}
.ctrl{display:flex;align-items:center;gap:12px;}
.ctrl-btn{width:40px;height:40px;border-radius:50%;border:2px solid var(--dark);background:var(--cream);font-size:20px;font-weight:900;color:var(--dark);cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:2px 2px 0 var(--dark);transition:0.13s;}
.ctrl-btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--dark);}
.ctrl-n{font-size:24px;font-weight:900;color:var(--dark);min-width:28px;text-align:center;}
.dots{display:flex;flex-wrap:wrap;gap:7px;}
.dot{width:30px;height:30px;border-radius:50%;border:2px solid var(--dark);background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:14px;transition:all 0.3s cubic-bezier(.34,1.4,.64,1);}
.dot.on{background:var(--pink);border-color:var(--pink);box-shadow:2px 2px 0 var(--dark);}
.dot.on::after{content:'💅';}
.dot:not(.on)::after{content:'·';font-size:22px;color:rgba(0,0,0,0.2);}
.saving{font-size:11px;color:var(--soft);font-weight:700;margin-top:10px;min-height:16px;}
.sec-lbl{font-size:11px;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;color:var(--mid);margin:20px 0 10px 2px;display:flex;align-items:center;justify-content:space-between;}
.refresh-btn{font-size:11px;font-weight:800;cursor:pointer;border:1.5px solid var(--dark);border-radius:8px;background:transparent;padding:4px 10px;color:var(--dark);font-family:inherit;}
.bcard{background:var(--card);border:2px solid var(--dark);border-radius:var(--r);box-shadow:3px 3px 0 var(--dark);padding:18px 20px;margin-bottom:12px;}
.bcard.done{opacity:0.5;background:var(--green-bg);border-color:rgba(30,180,100,0.5);box-shadow:none;}
.bc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;gap:10px;}
.bc-date{font-size:15px;font-weight:900;color:var(--dark);}
.bc-time{font-size:12px;font-weight:700;color:var(--soft);margin-top:2px;}
.status{font-size:11px;font-weight:900;padding:4px 11px;border-radius:99px;flex-shrink:0;text-transform:uppercase;}
.s-pending{background:var(--pink);color:#fff;}
.s-done{background:var(--green-bg);color:var(--green);border:1.5px solid var(--green);}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px;}
.chip{background:var(--cream);border:1.5px solid var(--dark);border-radius:99px;padding:4px 13px;font-size:12px;font-weight:800;color:var(--dark);}
.chip.money{background:var(--pink);color:#fff;border-color:var(--pink);}
.bc-wish{font-size:13px;color:var(--mid);font-style:italic;line-height:1.65;padding:10px 14px;background:var(--cream);border-radius:10px;border-left:3px solid var(--pink);margin-bottom:12px;}
.bc-acts{display:flex;gap:8px;}
.act{padding:8px 16px;border-radius:10px;font-size:12px;font-weight:900;cursor:pointer;border:2px solid var(--dark);font-family:inherit;text-transform:uppercase;transition:0.13s;}
.a-done{background:var(--dark);color:#fff;box-shadow:2px 2px 0 var(--pink);}
.a-done:active{transform:translate(1px,1px);box-shadow:none;}
.empty{text-align:center;padding:44px 20px;color:var(--soft);}
.empty .ei{font-size:40px;margin-bottom:12px;}
.loading{text-align:center;padding:30px;color:var(--soft);font-size:13px;font-weight:700;}
.spinner{display:inline-block;width:24px;height:24px;border:2px solid rgba(240,62,110,0.2);border-top-color:var(--pink);border-radius:50%;animation:spin 0.65s linear infinite;margin-bottom:8px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="logo">LIZ</div>
    <div class="badge">Admin</div>
  </div>
  <div class="page-title">LIZ'S<br><em>BOOKINGS</em></div>
  <p class="page-sub">只有你看得到這個頁面</p>
  <div class="stats">
    <div class="stat"><div class="stat-n" id="sTotal">—</div><div class="stat-l">總預約</div></div>
    <div class="stat"><div class="stat-n pink" id="sPending">—</div><div class="stat-l">待處理</div></div>
    <div class="stat"><div class="stat-n" id="sStamps">—</div><div class="stat-l">剩餘次數</div></div>
  </div>
  <div class="stamp-card">
    <div class="sc-row">
      <div class="sc-info">
        <div class="ttl">集點管理</div>
        <div class="sub">調整後自動同步到 Liz 的頁面</div>
      </div>
      <div class="ctrl">
        <button class="ctrl-btn" onclick="adj(-1)">−</button>
        <div class="ctrl-n" id="ctrlN">—</div>
        <button class="ctrl-btn" onclick="adj(1)">+</button>
      </div>
    </div>
    <div class="dots" id="dots"></div>
    <div class="saving" id="savingMsg"></div>
  </div>
  <div class="sec-lbl">
    <span>預約紀錄</span>
    <button class="refresh-btn" onclick="loadAll()">↻ 重新整理</button>
  </div>
  <div id="blist"><div class="loading"><div class="spinner"></div><br>載入中...</div></div>
</div>
<script>
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbwourOV2lxD0dFBHKmV5t_Vmzn4vsOskaCXnMFXRbd5LOSQJbYJ8b2NQ1QFpXwdeCTi/exec';
let stamps = 12;
let saveTimer = null;
async function loadAll(){await loadStamps();await loadBookings();}
async function loadStamps(){
  try{const res=await fetch(SHEET_URL+'?action=getStamps');const data=await res.json();stamps=data.stamps??12;renderStamps();}catch(e){}
}
function renderStamps(){
  document.getElementById('ctrlN').textContent=stamps;
  document.getElementById('sStamps').textContent=stamps;
  const dots=document.getElementById('dots');dots.innerHTML='';
  for(let i=0;i<12;i++){const el=document.createElement('div');el.className='dot'+(i<stamps?' on':'');dots.appendChild(el);}
}
function adj(delta){
  stamps=Math.max(0,Math.min(12,stamps+delta));renderStamps();
  clearTimeout(saveTimer);
  document.getElementById('savingMsg').textContent='儲存中...';
  saveTimer=setTimeout(async()=>{
    try{await fetch(SHEET_URL,{method:'POST',body:JSON.stringify({action:'setStamps',stamps})});
    document.getElementById('savingMsg').textContent='✓ 已同步';
    setTimeout(()=>document.getElementById('savingMsg').textContent='',2500);}
    catch(e){document.getElementById('savingMsg').textContent='⚠️ 同步失敗，請重試';}
  },800);
}
async function loadBookings(){
  document.getElementById('blist').innerHTML='<div class="loading"><div class="spinner"></div><br>載入中...</div>';
  try{
    const res=await fetch(SHEET_URL+'?action=getBookings');
    const data=await res.json();
    const rows=(data.rows||[]).slice(1).reverse();
    document.getElementById('sTotal').textContent=rows.length;
    const doneSet=JSON.parse(localStorage.getItem('lizDone')||'[]');
    document.getElementById('sPending').textContent=rows.filter((_,i)=>!doneSet.includes(i)).length;
    if(!rows.length){document.getElementById('blist').innerHTML='<div class="empty"><div class="ei">🌸</div><p>等 Liz 來預約吧</p></div>';return;}
    document.getElementById('blist').innerHTML=rows.map((row,idx)=>{
      const isDone=doneSet.includes(idx);
      const wish=row[6]?`<div class="bc-wish">「${row[6]}」</div>`:'';
      const badge=isDone?'<span class="status s-done">✓ 完成</span>':'<span class="status s-pending">待安排</span>';
      const doneBtn=!isDone?`<button class="act a-done" onclick="markDone(${idx})">✓ 完成 (−1次)</button>`:'';
      return `<div class="bcard ${isDone?'done':''}">
        <div class="bc-top"><div><div class="bc-date">${row[1]||'—'}</div><div class="bc-time">${row[2]||'—'}</div></div>${badge}</div>
        <div class="chips"><span class="chip">📐 ${row[3]||'—'}</span><span class="chip">🎨 ${row[4]||'—'}</span><span class="chip money">NT$ ${parseInt(row[5]||0).toLocaleString()}</span></div>
        ${wish}<div class="bc-acts">${doneBtn}</div>
      </div>`;
    }).join('');
  }catch(e){document.getElementById('blist').innerHTML='<div class="empty"><div class="ei">⚠️</div><p>載入失敗，請重試</p></div>';}
}
function markDone(idx){
  const doneSet=JSON.parse(localStorage.getItem('lizDone')||'[]');
  if(!doneSet.includes(idx)){doneSet.push(idx);localStorage.setItem('lizDone',JSON.stringify(doneSet));stamps=Math.max(0,stamps-1);fetch(SHEET_URL,{method:'POST',body:JSON.stringify({action:'setStamps',stamps})});}
  loadAll();
}
loadAll();
</script>
</body>
</html>
